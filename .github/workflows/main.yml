name: Phoenix Trader Bot

on:
  schedule:
    - cron: "*/5 * * * *"  # هر 5 دقیقه یک بار اجرا میشه
  workflow_dispatch:  # امکان اجرا دستی هم فراهم میشه

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install requests pandas

      - name: Run bot
        run: python main.py
